<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yay! 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 3rem 4rem;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(255,105,135,0.3);
        }
        .big-emoji {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #d6336c;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1.1rem;
            color: #555;
            line-height: 1.8;
            margin-bottom: 1rem;
        }
        .hearts {
            font-size: 2rem;
            margin-top: 1rem;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .back {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.6rem 2rem;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff6b95, #ff8e53);
            color: white;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(255,107,149,0.4);
            transition: all 0.2s;
        }
        .back:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="big-emoji">🎉💖🥳</div>
        <h1>I knew it! 💕</h1>
        <p>Can't wait for our date!<br>You just made my day 🥰</p>
        <div class="hearts">💗 💖 💕</div>
        <a class="back" href="index.html">← Back</a>
    </div>
</body>
</html>
