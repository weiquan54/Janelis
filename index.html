<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Janelis 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow: hidden; width: 100%; height: 100%; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 3rem 4rem 5rem;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(255,105,135,0.3);
            position: relative;
            overflow: hidden;
        }
        .cute-img {
            font-size: 5rem;
            margin-bottom: 1rem;
            display: block;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #d6336c;
            margin-bottom: 2rem;
        }
        .btns {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 0.8rem 2.5rem;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            min-width: 100px;
        }
        .btn-yes {
            background: linear-gradient(135deg, #ff6b95, #ff8e53);
            color: white;
            box-shadow: 0 6px 20px rgba(255,107,149,0.4);
        }
        .btn-yes:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 28px rgba(255,107,149,0.5);
        }
        .btn-no {
            background: #e0e0e0;
            color: #666;
            padding: 0.8rem 2.5rem;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            min-width: 100px;
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div class="cute-img">🥺</div>
        <h1>Do you wanna date with me?</h1>
        <div class="btns">
            <button class="btn btn-yes" onclick="location.href='yes.html'">Yes 💕</button>
            <button class="btn btn-no" id="noBtn" onmouseenter="dodge()">No</button>
        </div>
    </div>
    <script>
        function dodge() {
            const btn = document.getElementById('noBtn');
            const card = document.getElementById('card');
            const cw = card.clientWidth;
            const ch = card.clientHeight;
            const bw = btn.offsetWidth;
            const bh = btn.offsetHeight;
            const pad = 15;
            const x = pad + Math.random() * (cw - bw - pad * 2);
            const y = pad + Math.random() * (ch - bh - pad * 2);
            btn.style.position = 'absolute';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }
    </script>
</body>
</html>
